<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>handspring</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
    /* Inset the preview so the menu bar (top), dock (bottom), and side edges
       stay accessible. The cursor mapping is pre-insetted on the Python side
       so pointing anywhere inside this visible rectangle still covers the
       entire screen — the black margin is just visual breathing room. */
    img { position: fixed;
          top: 4vh; left: 4vw; width: 92vw; height: 88vh;
          object-fit: cover; object-position: center;
          border-radius: 10px;
          -webkit-user-select: none; user-select: none; pointer-events: none; }
  </style>
</head>
<body>
  <img src="http://127.0.0.1:8765/stream" alt="handspring stream">
</body>
</html>
